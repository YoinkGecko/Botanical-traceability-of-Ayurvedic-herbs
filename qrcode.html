<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blockchain Supply Chain Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center p-4">
  <!-- Heading -->
  <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-6 text-center">
    Blockchain Supply Chain Data
  </h1>

  <div class="w-full max-w-xl space-y-4" id="blocksContainer">
    <!-- Blocks will be injected here -->
  </div>

  <script>
    // ----- Get IDs from URL query (in correct order) -----
    const urlParams = new URLSearchParams(window.location.search);
    const ids = [
      urlParams.get("farmer"),      // Farmer first
      urlParams.get("processor"),   // Processor second
      urlParams.get("labtester"),   // Lab Tester third
      urlParams.get("manufacturer") // Manufacturer last
    ];
    const labels = ["Farmer", "Processor", "Lab Tester", "Manufacturer"];
    const container = document.getElementById("blocksContainer");

    // ----- Map display label to role key in data -----
    const roleKeyMap = {
      Farmer: "farmer",
      Processor: "processor",
      "Lab Tester": "lab-testers",
      Manufacturer: "manufacturer"
    };

    // ----- Define fields per role -----
    const roleFields = {
      farmer: [
        "FbatchID","Fid","TypeOfHerb","HarvestedBy","Quantity","Location","Timestamp","District","Photos","Status","ApprovedBy"
      ],
      processor: [
        "PbatchID","Pid","LinkedFarmerBatchID","ProcessingStep","WeightGivenByFarmer","WeightBeforeProc","WeightAfterProcessing",
        "Parameters","Location","LocationAccuracy","District","Timestamp","Photos","Status","ApprovedBy"
      ],
      "lab-testers": [
        "LbatchID","LabID","LinkedBatchID","TestType","TestResults","DNASequence","PassFailStatus",
        "CertificateFile","Location","LocationAccuracy","District","Timestamp","Photos","Status","ApprovedBy"
      ],
      manufacturer: [
        "MbatchID","ManufacturerID","LinkedLabBatchID","ProductName","ProductForm","Ingredients","PackagingInfo",
        "WeightFinal","Location","District","Timestamp","Photos","Status","ApprovedBy"
      ]
    };

    // ----- Fetch block from server -----
    async function fetchBlock(id) {
      try {
        const res = await fetch(`http://localhost:3000/block/${id}`);
        if (!res.ok) throw new Error("Block not found");
        return await res.json();
      } catch (err) {
        return { error: err.message };
      }
    }

    // ----- Create card UI -----
    function createBlockUI(label, block, role) {
      const card = document.createElement("div");
      card.className = "bg-white shadow-md rounded-lg p-4 cursor-pointer transition hover:shadow-lg";

      // Header
      const header = document.createElement("div");
      header.className = "flex justify-between items-center";
      const title = document.createElement("h2");
      title.className = "text-lg font-semibold";
      title.innerText = label;
      const toggleIcon = document.createElement("span");
      toggleIcon.innerText = "+";
      toggleIcon.className = "text-xl font-bold transition-transform";

      header.appendChild(title);
      header.appendChild(toggleIcon);
      card.appendChild(header);

      // Content
      const content = document.createElement("div");
      content.className = "mt-2 text-sm text-gray-700 hidden space-y-1";

      if (block.error) {
        content.innerHTML = `<p class="text-red-500">${block.error}</p>`;
      } else {
        const fields = roleFields[role];
        fields.forEach(f => {
          if (block.data[f] !== undefined) {
            const p = document.createElement("p");
            p.innerHTML = `<span class="font-semibold">${f}:</span> ${block.data[f]}`;
            content.appendChild(p);
          }
        });
      }

      card.appendChild(content);

      // Toggle expand/collapse
      card.addEventListener("click", () => {
        content.classList.toggle("hidden");
        toggleIcon.innerText = content.classList.contains("hidden") ? "+" : "−";
      });

      container.appendChild(card);
    }

    // ----- Main: fetch and show all blocks in correct order -----
    ids.forEach(async (id, idx) => {
      if (!id) return;
      const block = await fetchBlock(id);
      const roleKey = roleKeyMap[labels[idx]];
      createBlockUI(labels[idx], block, roleKey);
    });
  </script>
</body>
</html>
