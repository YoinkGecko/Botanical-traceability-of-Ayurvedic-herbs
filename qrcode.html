<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blockchain Supply Chain Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center p-4">
  <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-6 text-center">
    Supply Chain Data powered by Blockchain
  </h1>

  <div class="w-full max-w-xl space-y-4" id="blocksContainer"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const ids = {
      farmer: urlParams.get("farmer"),
      processor: urlParams.get("processor"),
      labtester: urlParams.get("labtester"),
      manufacturer: urlParams.get("manufacturer")
    };
    const labels = {
      farmer: "Farmer",
      processor: "Processor",
      labtester: "Lab Tester",
      manufacturer: "Manufacturer"
    };
    const container = document.getElementById("blocksContainer");

    const roleFields = {
      farmer: ["FbatchID","Fid","TypeOfHerb","HarvestedBy","Quantity","Location","Timestamp","District","Photos","Status","ApprovedBy"],
      processor: ["PbatchID","Pid","LinkedFarmerBatchID","ProcessingStep","WeightGivenByFarmer","WeightBeforeProc","WeightAfterProcessing",
                  "Parameters","Location","LocationAccuracy","District","Timestamp","Photos","Status","ApprovedBy"],
      labtester: ["LbatchID","LabID","LinkedBatchID","TestType","TestResults","DNASequence","PassFailStatus",
                  "CertificateFile","Location","LocationAccuracy","District","Timestamp","Photos","Status","ApprovedBy"],
      manufacturer: ["MbatchID","ManufacturerID","LinkedLabBatchID","ProductName","ProductForm","Ingredients","PackagingInfo",
                     "WeightFinal","Location","District","Timestamp","Photos","Status","ApprovedBy"]
    };

    const friendlyNames = {
      FbatchID:"Farmer Batch ID", Fid:"Farmer ID", TypeOfHerb:"Herb Type", HarvestedBy:"Harvested By", Quantity:"Quantity (kg)",
      Location:"Location (lat,long)", Timestamp:"Harvested On", District:"District", Photos:"Photos", Status:"Status", ApprovedBy:"Approved By",
      PbatchID:"Processor Batch ID", Pid:"Processor ID", LinkedFarmerBatchID:"Linked Farmer Batch ID", ProcessingStep:"Processing Step",
      WeightGivenByFarmer:"Weight Given By Farmer", WeightBeforeProc:"Weight Before Processing", WeightAfterProcessing:"Weight After Processing",
      Parameters:"Parameters", LocationAccuracy:"Location Accuracy",
      LbatchID:"Lab Batch ID", LabID:"Lab ID", LinkedBatchID:"Linked Batch ID", TestType:"Test Type", TestResults:"Test Results",
      DNASequence:"DNA Sequence", PassFailStatus:"Pass/Fail Status", CertificateFile:"Certificate File",
      MbatchID:"Manufacturer Batch ID", ManufacturerID:"Manufacturer ID", LinkedLabBatchID:"Linked Lab Batch ID",
      ProductName:"Product Name", ProductForm:"Product Form", Ingredients:"Ingredients", PackagingInfo:"Packaging Info",
      WeightFinal:"Final Weight"
    };

    async function fetchBlock(role, id) {
      if(!id) return { error: `No ${role} ID provided` };
      try {
        let endpoint = "";
        switch(role) {
          case "farmer": endpoint = `/block/fbatch/${id}`; break;
          case "processor": endpoint = `/block/processor/${id}`; break;
          case "labtester": endpoint = `/block/labtester/${id}`; break;
          case "manufacturer": endpoint = `/block/manufacturer/${id}`; break;
        }
        const res = await fetch(`https://9rp3msd0-3000.inc1.devtunnels.ms${endpoint}`);
        if(!res.ok) throw new Error(`${labels[role]} ID not found`);
        return await res.json();
      } catch (err) {
        return { error: err.message };
      }
    }

    function createBlockUI(label, block, role) {
      const card = document.createElement("div");
      card.className = "bg-white shadow-md rounded-lg p-4 cursor-pointer transition hover:shadow-lg";

      const header = document.createElement("div");
      header.className = "flex justify-between items-center";
      const title = document.createElement("h2");
      title.className = "text-lg font-semibold";
      title.innerText = label;
      const toggleIcon = document.createElement("span");
      toggleIcon.innerText = "+";
      toggleIcon.className = "text-xl font-bold transition-transform";
      header.appendChild(title);
      header.appendChild(toggleIcon);
      card.appendChild(header);

      const content = document.createElement("div");
      content.className = "mt-2 text-sm text-gray-700 hidden space-y-1";

      if(block.error){
        content.innerHTML = `<p class="text-red-500">${block.error}</p>`;
      } else {
        const fields = roleFields[role];
        fields.forEach(f => {
          if(block.data[f] !== undefined){
            const displayName = friendlyNames[f] || f;
            const p = document.createElement("p");

            if(f === "Location"){ 
              const link = document.createElement("a");
              link.href = `https://www.google.com/maps?q=${block.data[f]}`;
              link.target = "_blank";
              link.className = "text-blue-600 underline";
              link.innerText = block.data[f];
              p.innerHTML = `<span class="font-semibold">${displayName}:</span> `;
              p.appendChild(link);
            } else {
              p.innerHTML = `<span class="font-semibold">${displayName}:</span> ${block.data[f]}`;
            }

            content.appendChild(p);
          }
        });
      }

      card.appendChild(content);
      card.addEventListener("click", ()=> {
        content.classList.toggle("hidden");
        toggleIcon.innerText = content.classList.contains("hidden") ? "+" : "−";
      });

      container.appendChild(card);
    }

    async function displayBlocks() {
      for (const role of ["farmer", "processor", "labtester", "manufacturer"]) {
        const block = await fetchBlock(role, ids[role]);
        createBlockUI(labels[role], block, role);
      }
    }

    displayBlocks();
  </script>
</body>
</html>
