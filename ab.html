        /* Button styles */

            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: calc(var(--radius) - 2px);
            font-size: 0.875rem;
            font-weight: var(--font-weight-medium);
            transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            cursor: pointer;
            padding: 0.5rem 1rem;
            height: 2.25rem;
        }

        .btn-default {
            background-color: var(--primary);
            color: var(--primary-foreground);
        }

        .btn-default:hover {
            opacity: 0.9;
        }

        .btn-ghost {
            background-color: transparent;
            color: var(--foreground);
        }

        .btn-ghost:hover {
            background-color: var(--accent);
            color: var(--accent-foreground);
        }

            background-color: var(--card);
            color: var(--card-foreground);

            border-radius: 9999px;
            border: 1px solid transparent;
            padding: 0.125rem 0.625rem;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);

        /* Accordion styles */
        .accordion-item {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 1rem;
        }

        .accordion-trigger {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 1.5rem;
            background: transparent;
            border: none;
            cursor: pointer;
            text-align: left;
            transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .accordion-trigger:hover {
            text-decoration: none;
        }

        .accordion-content {
            overflow: hidden;
            transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
        }

        .accordion-content.open {
            max-height: 2000px;
        }

        .accordion-chevron {
            margin-left: auto;
            transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .accordion-item.open .accordion-chevron {
            transform: rotate(180deg);
        }

            padding: 0.5rem;

            .sm-col-span-2 { grid-column: span 2 / span 2; }
        }

            .lg-p-8 { padding: 2rem; }
        }

                    packagingInfo: "पैकेजिंग जानकारी",
                    finalWeight: "अंतिम वजन (किग्रा)",
                    qrCode: "क्यूआर कोड आईडी"
                }
            }
        };

        let currentLanguage = 'en';

        function setLanguage(lang) {
            currentLanguage = lang;
            
            // Update button states
            const btnEn = document.getElementById('btn-en');
            const btnHi = document.getElementById('btn-hi');
            
            if (lang === 'en') {
                btnEn.className = 'btn btn-default';
                btnHi.className = 'btn btn-ghost';
            } else {
                btnEn.className = 'btn btn-ghost';
                btnHi.className = 'btn btn-default';
            }
            
            updateContent();
        }

        function updateContent() {
            const currentLabels = labels[currentLanguage];
            
            // Update main title
            document.getElementById('main-title').textContent = currentLabels.title;
            
            // Update section titles
            document.getElementById('farmers-title').textContent = currentLabels.farmer;
            document.getElementById('processors-title').textContent = currentLabels.processor;
            document.getElementById('lab-testers-title').textContent = currentLabels.labTester;
            document.getElementById('manufacturers-title').textContent = currentLabels.manufacturer;
            
            // Update view details text
            const viewText = currentLanguage === 'en' ? 'View Details' : 'विवरण देखें';
            document.getElementById('farmers-view').textContent = viewText;
            document.getElementById('processors-view').textContent = viewText;
            document.getElementById('lab-testers-view').textContent = viewText;
            document.getElementById('manufacturers-view').textContent = viewText;
            
            // Update footer
            document.getElementById('footer').textContent = currentLanguage === 'en' 
                ? "Blockchain-powered herb supply chain transparency"
                : "ब्लॉकचेन-संचालित जड़ी-बूटी आपूर्ति श्रृंखला पारदर्शिता";
            
            // Update records
            populateRecords();
        }

        function formatTimestamp(timestamp) {
            return new Date(timestamp).toLocaleString(currentLanguage === 'hi' ? 'hi-IN' : 'en-IN');
        }

        function getStatusBadgeClass(status) {
            switch (status) {
                case 'APPROVED': return 'bg-green-100 text-green-800';
                case 'PENDING': return 'bg-yellow-100 text-yellow-800';
                case 'REJECTED': return 'bg-red-100 text-red-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        function openGoogleMaps(location) {
            const coords = location.split(',');
            if (coords.length === 2) {
                const lat = parseFloat(coords[0]);
                const lng = parseFloat(coords[1]);
                const googleMapsUrl = `https://www.google.com/maps?q=${lat},${lng}&z=15`;
                window.open(googleMapsUrl, '_blank');
            }
        }

        function createRecordCard(record, renderFunction) {
            const currentLabels = labels[currentLanguage];
            
            return `
                <div class="card">
                    <div class="card-header pb-3">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <svg class="w-4 h-4 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                <span class="text-sm text-muted-foreground">
                                    ${formatTimestamp(record.data.Timestamp)}
                                </span>
                            </div>
                            <div class="flex items-center gap-2 cursor-pointer group hover-text-primary" onclick="openGoogleMaps('${record.data.Location}')" title="${currentLanguage === 'en' ? 'Open in Google Maps' : 'Google Maps में खोलें'}">
                                <svg class="w-4 h-4 text-muted-foreground group-hover-text-primary transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                                <span class="text-sm text-muted-foreground group-hover-text-primary transition-colors">
                                    ${record.data.District}
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="card-content">
                        ${renderFunction(record.data, currentLabels)}
                        <div class="mt-4 pt-3 border-t">
                            <div class="flex justify-between text-xs text-muted-foreground">
                                <span>Block #${record.index}</span>
                                <span class="font-mono truncate max-w-32">
                                    ${record.hash.substring(0, 16)}...
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFarmerRecord(data, labels) {
            return `
                <div class="grid gap-4 sm-grid-cols-2">
                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.batchId}:</span>
                            <span class="text-sm">${data.FbatchID}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.herbType}:</span>
                            <span class="text-sm">${data.TypeOfHerb}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.quantity}:</span>
                            <span class="text-sm">${data.Quantity}</span>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.harvestedBy}:</span>
                            <span class="text-sm">${data.HarvestedBy}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.district}:</span>
                            <span class="text-sm">${data.District}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-muted-foreground">${labels.fields.status}:</span>
                            <span class="badge ${getStatusBadgeClass(data.Status)}">${data.Status}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderProcessorRecord(data, labels) {
            return `
                <div class="grid gap-4 sm-grid-cols-2">
                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.batchId}:</span>
                            <span class="text-sm">${data.PbatchID}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.processingStep}:</span>
                            <span class="text-sm">${data.ProcessingStep}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.linkedBatch}:</span>
                            <span class="text-sm">${data.LinkedFarmerBatchID}</span>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.weightBefore}:</span>
                            <span class="text-sm">${data.WeightBeforeProc}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.weightAfter}:</span>
                            <span class="text-sm">${data.WeightAfterProcessing}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-muted-foreground">${labels.fields.status}:</span>
                            <span class="badge ${getStatusBadgeClass(data.Status)}">${data.Status}</span>
                        </div>
                    </div>
                    <div class="sm-col-span-2">
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.parameters}:</span>
                            <span class="text-sm text-right">${data.Parameters}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLabRecord(data, labels) {
            return `
                <div class="grid gap-4 sm-grid-cols-2">
                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.batchId}:</span>
                            <span class="text-sm">${data.LbatchID}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.testType}:</span>
                            <span class="text-sm">${data.TestType}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-muted-foreground">${labels.fields.passFailStatus}:</span>
                            <span class="badge ${data.PassFailStatus === 'PASS' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                ${data.PassFailStatus}
                            </span>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.district}:</span>
                            <span class="text-sm">${data.District}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.certificateFile}:</span>
                            <span class="text-sm">${data.CertificateFile}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-muted-foreground">${labels.fields.status}:</span>
                            <span class="badge ${getStatusBadgeClass(data.Status)}">${data.Status}</span>
                        </div>
                    </div>
                    <div class="sm-col-span-2">
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.testResults}:</span>
                            <span class="text-sm text-right">${data.TestResults}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderManufacturerRecord(data, labels) {
            return `
                <div class="grid gap-4 sm-grid-cols-2">
                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.batchId}:</span>
                            <span class="text-sm">${data.MbatchID}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.productName}:</span>
                            <span class="text-sm">${data.ProductName}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.productForm}:</span>
                            <span class="text-sm">${data.ProductForm}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.finalWeight}:</span>
                            <span class="text-sm">${data.WeightFinal}</span>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.qrCode}:</span>
                            <span class="text-sm">${data.QRCodeID}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.district}:</span>
                            <span class="text-sm">${data.District}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.packagingInfo}:</span>
                            <span class="text-sm">${data.PackagingInfo}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-muted-foreground">${labels.fields.status}:</span>
                            <span class="badge ${getStatusBadgeClass(data.Status)}">${data.Status}</span>
                        </div>
                    </div>
                    <div class="sm-col-span-2">
                        <div class="flex justify-between">
                            <span class="text-sm text-muted-foreground">${labels.fields.ingredients}:</span>
                            <span class="text-sm text-right">${data.Ingredients}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function populateRecords() {
            // Filter records by role (same as your React app)
            const farmerRecords = blockchainData.filter(record => record.data.role === 'farmers');
            const processorRecords = blockchainData.filter(record => record.data.role === 'processors');
            const labTesterRecords = blockchainData.filter(record => record.data.role === 'lab-testers');
            const manufacturerRecords = blockchainData.filter(record => record.data.role === 'manufacturers');

            // Populate farmers
            document.getElementById('farmers-records').innerHTML = farmerRecords
                .map(record => createRecordCard(record, renderFarmerRecord)).join('');

            // Populate processors
            document.getElementById('processors-records').innerHTML = processorRecords
                .map(record => createRecordCard(record, renderProcessorRecord)).join('');

            // Populate lab testers
            document.getElementById('lab-testers-records').innerHTML = labTesterRecords
                .map(record => createRecordCard(record, renderLabRecord)).join('');

            // Populate manufacturers
            document.getElementById('manufacturers-records').innerHTML = manufacturerRecords
                .map(record => createRecordCard(record, renderManufacturerRecord)).join('');
        }

        function toggleAccordion(role) {
            const item = document.getElementById(role + '-item');
            const content = document.getElementById(role + '-content');
            
            const isOpen = item.classList.contains('open');
            
            if (isOpen) {
                item.classList.remove('open');
                content.classList.remove('open');
            } else {
                item.classList.add('open');
                content.classList.add('open');
            }
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            updateContent();
        });
    </script>
</body>
</html>
